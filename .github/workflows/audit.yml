name: Audit

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Run audit
        run: npm run audit
