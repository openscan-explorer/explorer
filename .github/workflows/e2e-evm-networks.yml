name: E2E Tests - EVM Networks

on:
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

jobs:
  e2e-evm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: arbitrum
            tests: "e2e/tests/evm-networks/arbitrum.spec.ts"
          - name: base
            tests: "e2e/tests/evm-networks/base.spec.ts"
          - name: optimism
            tests: "e2e/tests/evm-networks/optimism.spec.ts"
          - name: bsc
            tests: "e2e/tests/evm-networks/bsc.spec.ts"
          - name: polygon
            tests: "e2e/tests/evm-networks/polygon.spec.ts"
          - name: avalanche
            tests: "e2e/tests/evm-networks/avalanche.spec.ts"
          - name: l2-fields
            tests: "e2e/tests/evm-networks/l2-fields.spec.ts"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build application
        run: ./scripts/build-production.sh

      - name: Run EVM Networks E2E tests (${{ matrix.shard.name }})
        run: bunx playwright test ${{ matrix.shard.tests }}
        env:
          CI: true
          INFURA_API_KEY: ${{ secrets.INFURA_API_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-evm-${{ matrix.shard.name }}
          path: playwright-report/
          retention-days: 7
